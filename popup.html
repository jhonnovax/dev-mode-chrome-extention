<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev Mode</title>
  <style>
    :root {
      --bg: #fff;
      --bg-hover: #f5f5f5;
      --bg-active: #e8e8e8;
      --text: #202124;
      --text-secondary: #5f6368;
      --border: #dadce0;
      --shadow: rgba(0, 0, 0, 0.1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #292a2d;
        --bg-hover: #3c3d40;
        --bg-active: #4a4b4e;
        --text: #e8eaed;
        --text-secondary: #9aa0a6;
        --border: #5f6368;
        --shadow: rgba(0, 0, 0, 0.3);
      }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-width: 200px;
      background: var(--bg);
      padding: 6px;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s ease;
      border: none;
      background: transparent;
    }

    .menu-item:hover {
      background: var(--bg-hover);
    }

    .menu-item:active {
      background: var(--bg-active);
    }

    .menu-item.active {
      background: var(--bg-hover);
    }

    .indicator {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-secondary);
      flex-shrink: 0;
      transition: all 0.15s ease;
    }

    .menu-item.dev .indicator { background: #00C853; }
    .menu-item.prod .indicator { background: #D32F2F; }
    .menu-item.off .indicator { background: #9e9e9e; }

    .menu-item.dev.active .indicator { box-shadow: 0 0 6px #00C853; }
    .menu-item.prod.active .indicator { box-shadow: 0 0 6px #D32F2F; }
    .menu-item.off.active .indicator { box-shadow: 0 0 6px #9e9e9e; }

    .menu-item:not(.active) .indicator {
      opacity: 0.4;
    }

    .label {
      flex: 1;
      font-size: 13px;
      font-weight: 400;
      color: var(--text);
    }

    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.3px;
    }

    .menu-item.dev .badge {
      background: rgba(0, 200, 83, 0.15);
      color: #00a344;
    }

    .menu-item.prod .badge {
      background: rgba(211, 47, 47, 0.15);
      color: #c62828;
    }

    .menu-item.off .badge {
      background: rgba(158, 158, 158, 0.15);
      color: var(--text-secondary);
    }

    @media (prefers-color-scheme: dark) {
      .menu-item.dev .badge {
        background: rgba(0, 200, 83, 0.2);
        color: #69f0ae;
      }

      .menu-item.prod .badge {
        background: rgba(211, 47, 47, 0.2);
        color: #ef9a9a;
      }

      .menu-item.off .badge {
        background: rgba(158, 158, 158, 0.2);
        color: #bdbdbd;
      }
    }

    /* Entry animation */
    .menu-item {
      opacity: 0;
      transform: translateY(-8px);
      animation: slideIn 0.15s ease forwards;
    }

    .menu-item:nth-child(1) { animation-delay: 0s; }
    .menu-item:nth-child(2) { animation-delay: 0.03s; }
    .menu-item:nth-child(3) { animation-delay: 0.06s; }

    @keyframes slideIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Click ripple effect */
    .menu-item {
      position: relative;
      overflow: hidden;
    }

    .ripple {
      position: absolute;
      border-radius: 50%;
      background: var(--shadow);
      transform: scale(0);
      animation: ripple 0.4s ease-out;
      pointer-events: none;
    }

    @keyframes ripple {
      to {
        transform: scale(2.5);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="menu">
    <div class="menu-item dev" data-state="dev">
      <span class="indicator"></span>
      <span class="label">Development</span>
      <span class="badge">DEV</span>
    </div>
    <div class="menu-item prod" data-state="prod">
      <span class="indicator"></span>
      <span class="label">Production</span>
      <span class="badge">PRO</span>
    </div>
    <div class="menu-item off" data-state="off">
      <span class="indicator"></span>
      <span class="label">Off</span>
      <span class="badge">OFF</span>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
